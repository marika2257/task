<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Azuma Schedule</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>今日のタスク</h1>

<h2>デイリークエスト</h2>
<div id="daily-quests"></div>

    <!-- タスク一覧 -->
    <div id="task-list"></div>

    <!-- タスク追加フォーム -->
    <input id="task-input" type="text" placeholder="タスクを追加">

    <!-- カテゴリ選択 -->
    <select id="task-category">
        <option value="str">筋トレ（STR）</option>
        <option value="int">勉強（INT）</option>
        <option value="vit">運動（VIT）</option>
        <option value="luk">ラッキー（LUK）</option>
    </select>

    <button id="add-task">追加</button>

    <!-- メッセージ表示 -->
    <div id="message-box"></div>

    <!-- ステータス表示 -->
    <div id="status-stats">
        <h2>ステータス</h2>
        <div>STR（ちから）: <span id="stat-str">0</span></div>
        <div>INT（ちしき）: <span id="stat-int">0</span></div>
        <div>VIT（たいりょく）: <span id="stat-vit">0</span></div>
        <div>LUK（うん）: <span id="stat-luk">0</span></div>
    </div>

    <!-- EXPバー -->
    <div id="status-area">
        <div id="level-text">Lv 1</div>
        <div id="exp-container">
            <div id="exp-bar"></div>
        </div>
    </div>

    <!-- レベルアップ演出 -->
    <div id="levelup-cutin">LEVEL UP!</div>

    <!-- JavaScript読み込み（必ず最後） -->
    <script src="script.js"></script>

</body>
</html>
