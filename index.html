<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Azuma Schedule</title>

    <!-- スマホ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS読み込み -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>今日のタスク</h1>

    <!-- タスク一覧 -->
    <div id="task-list"></div>

    <!-- タスク追加フォーム -->
    <input id="task-input" type="text" placeholder="タスクを追加">
    <button id="add-task">追加</button>

    <!-- メッセージ表示 -->
    <div id="message-box"></div>

    <!-- ペルソナ風ステータス表示 -->
    <div id="status-area">
        <div id="level-text">Lv 1</div>
        <div id="exp-container">
            <div id="exp-bar"></div>
        </div>
    </div>

    <!-- ペルソナ風レベルアップカットイン -->
    <div id="levelup-cutin">LEVEL UP!</div>

    <!-- JavaScript読み込み（必ず最後） -->
    <script src="script.js"></script>

</body>
</html>
